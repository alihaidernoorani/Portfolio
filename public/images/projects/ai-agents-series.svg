<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="600" y="75" text-anchor="middle"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="40" font-weight="700" fill="white">
    AI Agents Series
  </text>
  <text x="600" y="110" text-anchor="middle"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="17" fill="#a78bfa">
    OpenAI Agents SDK · Python
  </text>

  <!-- Row 1: 3 cards -->
  <rect x="60" y="150" width="340" height="135" rx="12" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="230" y="207" text-anchor="middle" font-size="19" font-weight="600" fill="white" font-family="ui-sans-serif, system-ui, sans-serif">Poetry Agent</text>
  <text x="230" y="234" text-anchor="middle" font-size="13" fill="#a78bfa" font-family="ui-sans-serif, system-ui, sans-serif">Multi-agent orchestration</text>
  <text x="230" y="257" text-anchor="middle" font-size="12" fill="#6d28d9" font-family="ui-sans-serif, system-ui, sans-serif">Triage + Handoffs</text>

  <rect x="430" y="150" width="340" height="135" rx="12" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="600" y="207" text-anchor="middle" font-size="19" font-weight="600" fill="white" font-family="ui-sans-serif, system-ui, sans-serif">Weather Agent</text>
  <text x="600" y="234" text-anchor="middle" font-size="13" fill="#a78bfa" font-family="ui-sans-serif, system-ui, sans-serif">Live weather data</text>
  <text x="600" y="257" text-anchor="middle" font-size="12" fill="#6d28d9" font-family="ui-sans-serif, system-ui, sans-serif">Weatherstack API</text>

  <rect x="800" y="150" width="340" height="135" rx="12" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="970" y="207" text-anchor="middle" font-size="19" font-weight="600" fill="white" font-family="ui-sans-serif, system-ui, sans-serif">Translator Agent</text>
  <text x="970" y="234" text-anchor="middle" font-size="13" fill="#a78bfa" font-family="ui-sans-serif, system-ui, sans-serif">Natural language translation</text>
  <text x="970" y="257" text-anchor="middle" font-size="12" fill="#6d28d9" font-family="ui-sans-serif, system-ui, sans-serif">Tone-preserving</text>

  <!-- Row 2: 2 cards centred -->
  <rect x="245" y="315" width="340" height="135" rx="12" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="415" y="372" text-anchor="middle" font-size="19" font-weight="600" fill="white" font-family="ui-sans-serif, system-ui, sans-serif">Shopping Agent</text>
  <text x="415" y="399" text-anchor="middle" font-size="13" fill="#a78bfa" font-family="ui-sans-serif, system-ui, sans-serif">Product catalog search</text>
  <text x="415" y="422" text-anchor="middle" font-size="12" fill="#6d28d9" font-family="ui-sans-serif, system-ui, sans-serif">Smart match ranking</text>

  <rect x="615" y="315" width="340" height="135" rx="12" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="785" y="372" text-anchor="middle" font-size="19" font-weight="600" fill="white" font-family="ui-sans-serif, system-ui, sans-serif">Crypto Agent</text>
  <text x="785" y="399" text-anchor="middle" font-size="13" fill="#a78bfa" font-family="ui-sans-serif, system-ui, sans-serif">Live crypto prices</text>
  <text x="785" y="422" text-anchor="middle" font-size="12" fill="#6d28d9" font-family="ui-sans-serif, system-ui, sans-serif">Binance API</text>

  <text x="600" y="548" text-anchor="middle" font-size="13" fill="#4c1d95"
    letter-spacing="2" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="500">
    TOOL INTEGRATION · PROMPT ENGINEERING · AGENT ORCHESTRATION
  </text>
</svg>
